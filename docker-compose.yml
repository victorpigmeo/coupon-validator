name: couponvalidator

services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sa_couponvalidator
      POSTGRES_PASSWORD: sa_couponvalidator
      POSTGRES_DB: couponvalidator
    command: postgres -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - default

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass sa_couponvalidator
    volumes:
      - redis_data:/data
    networks:
      - default

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    driver: bridge